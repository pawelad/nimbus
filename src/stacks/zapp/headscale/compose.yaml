---
name: headscale

services:
  headplane:
    image: ghcr.io/tale/headplane:0.3.3
    container_name: headplane
    volumes:
      # Need access to the Headscale config and data
      - /data/apps/headscale/config:/etc/headscale:ro
      - /data/apps/headscale/data:/var/lib/headscale:ro
      - /data/apps/headplane:/data
    environment:
      # These will be populated by an Ansible template
      - COOKIE_SECRET=${HEADPLANE_COOKIE_SECRET}
      - HEADSCALE_URL=http://headscale:8080
      - HOST=0.0.0.0
      - PORT=3000
    networks:
      - dokploy-network
    restart: unless-stopped

  headscale:
    image: headscale/headscale:0.23.0
    container_name: headscale
    volumes:
      - /data/apps/headscale/config:/etc/headscale
      - /data/apps/headscale/data:/var/lib/headscale
    networks:
      - dokploy-network
    # Exposing the port so we can create a Dokploy Proxy App directly to it
    # E.g., headscale.pawelad.me -> http://headscale:8080
    command: headscale serve
    restart: unless-stopped

  tailscale:
    image: tailscale/tailscale:v1.80.3
    container_name: tailscale
    volumes:
      - /var/lib:/var/lib
      - /dev/net/tun:/dev/net/tun
      - /data/apps/tailscale:/var/lib/tailscale
    network_mode: "host"
    restart: unless-stopped
    cap_add:
      - net_admin
      - sys_module

networks:
  dokploy-network:
    external: true
