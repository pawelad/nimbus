---
name: tailscale-agent

services:
  tailscale:
    image: ghcr.io/tailscale/tailscale:v1.94.2
    container_name: tailscale
    volumes:
      - /data/apps/tailscale:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_HOSTNAME=${MACHINE_HOSTNAME}
      - TS_EXTRA_ARGS=--login-server=${HEADSCALE_URL}
    network_mode: "host"
    restart: unless-stopped
    cap_add:
      - net_admin
      - sys_module
    hostname: ${MACHINE_HOSTNAME}
