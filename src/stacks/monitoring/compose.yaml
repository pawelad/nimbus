---
name: monitoring

services:
  beszel-agent:
    image: henrygd/beszel-agent:0.9.1
    container_name: beszel-agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      PORT: 45876
      KEY: ${BESZEL_AGENT_KEY}
    network_mode: host
    restart: unless-stopped

  komodo-periphery:
    image: ghcr.io/moghtech/komodo-periphery:1.15.5
    container_name: komodo-periphery
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - KOMODO_PERIPHERY_PORT=8120
    network_mode: host
    restart: unless-stopped

  tailscale:
    image: tailscale/tailscale:v1.78.1
    container_name: tailscale
    volumes:
      - /data/nimbus/monitoring/tailscale:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    network_mode: host
    restart: unless-stopped
    cap_add:
      - net_admin
      - sys_module
    hostname: nimbus
