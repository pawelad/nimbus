server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static files from the bind mount
    location / {
        try_files $uri $uri/ =404;
    }

    # Add download headers for the certificate
    location = /root.crt {
        alias /tmp/certs/root.crt;
        default_type application/x-x509-ca-cert;
        add_header Content-Disposition 'attachment; filename="caddy-root-ca.crt"';
    }
}
