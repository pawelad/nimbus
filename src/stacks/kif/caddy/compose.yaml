---
name: caddy

services:
  caddy:
    image: lucaslorentz/caddy-docker-proxy:2.10-alpine
    container_name: caddy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - caddy_data:/data
    environment:
      CADDY_INGRESS_NETWORKS: caddy
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    networks:
      - caddy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://127.0.0.1:2019/metrics || exit 1
    labels:
      loggifly.monitor: "true"
      loggifly.excluded_keywords: '"level":"warn"' # yamllint disable-line

networks:
  caddy:
    external: true

volumes:
  caddy_data:
    name: caddy_data
