---
name: home-assistant

services:
  home-assistant:
    image: "ghcr.io/home-assistant/home-assistant:2026.1.3"
    container_name: home-assistant
    volumes:
      - /data/apps/home-assistant/data:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    environment:
      TZ: Europe/Warsaw
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: curl --connect-timeout 10 --silent --show-error --fail http://localhost:8123/ || exit 1
      start_period: 15s
    labels:
      # Caddy reverse proxy
      caddy: ha.home ha.pipusznicy
      caddy.tls: internal
      caddy.reverse_proxy: "host.docker.internal:8123"
      # LoggiFly
      loggifly.monitor: "true"
      loggifly.excluded_keywords: "Connection reset by peer"
      # Homepage service discovery
      homepage.group: Automation
      homepage.name: Home Assistant
      homepage.icon: home-assistant.png
      homepage.href: https://ha.home
      homepage.description: Home Control
      homepage.weight: 10
      homepage.widget.type: homeassistant
      homepage.widget.url: http://host.docker.internal:8123
      homepage.widget.key: "{{HOMEPAGE_VAR_HA_TOKEN}}"
    privileged: true

  mosquitto:
    image: eclipse-mosquitto:2.1.2-alpine
    container_name: mosquitto
    volumes:
      - /data/apps/home-assistant/mosquitto/config:/mosquitto/config
      - /data/apps/home-assistant/mosquitto/data:/mosquitto/data
    ports:
      - "0.0.0.0:1883:1883"
      - "0.0.0.0:9001:9001"
    networks:
      - caddy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "mosquitto_sub -h 127.0.0.1 -p 1884 -t '$$SYS/#' -C 1 -i healthcheck -W 3 || exit 1" ]

  music-assistant:
    image: ghcr.io/music-assistant/server:2.7.6
    container_name: music-assistant
    volumes:
      - /data/apps/home-assistant/music-assistant/data:/data
    environment:
      LOG_LEVEL: info
    network_mode: host
    restart: unless-stopped
    labels:
      # Caddy reverse proxy
      caddy: music.home music.pipusznicy
      caddy.tls: internal
      caddy.reverse_proxy: "host.docker.internal:8095"
      # Homepage service discovery
      homepage.group: Automation
      homepage.name: Music Assistant
      homepage.icon: music-assistant.png
      homepage.href: https://music.home
      homepage.description: Music Server
      homepage.weight: 30
    cap_add:
      - SYS_ADMIN
      - DAC_READ_SEARCH
    security_opt:
      - apparmor:unconfined

  zigbee2mqtt:
    image: koenkk/zigbee2mqtt:2.7.2
    container_name: zigbee2mqtt
    depends_on:
      - mosquitto
    volumes:
      - /data/apps/home-assistant/zigbee2mqtt:/app/data
      - /run/udev:/run/udev:ro
    environment:
      TZ: Europe/Warsaw
    ports:
      - "0.0.0.0:8080:8080"
    networks:
      - caddy
    restart: unless-stopped
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://127.0.0.1:8080/ || exit 1
    labels:
      # Caddy reverse proxy
      caddy: z2m.home z2m.pipusznicy
      caddy.tls: internal
      caddy.reverse_proxy: "{{upstreams 8080}}"
      # Homepage service discovery
      homepage.group: Infrastructure
      homepage.name: Zigbee2MQTT
      homepage.icon: zigbee2mqtt.png
      homepage.href: https://z2m.home
      homepage.description: Zigbee Bridge
      homepage.weight: 20
    devices:
      - ${ZIGBEE_DEVICE_PATH:-/dev/ttyUSB0}:/dev/ttyUSB0

networks:
  caddy:
    external: true
