---
- name: "Ensure docker is running and enabled"
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: "Include Dokku setup"
  ansible.builtin.import_tasks: setup_dokku.yml
  tags: [dokku]

- name: "Install and upgrade all packages"
  ansible.builtin.apt:
    upgrade: dist
    update_cache: true
