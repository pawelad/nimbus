---
- name: "Set hostname"
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

# User
- name: "Ensure server user exists"
  ansible.builtin.user:
    name: "{{ server_user }}"
    shell: /bin/bash
    groups: sudo
    append: true
    state: present

- name: "Ensure passwordless sudo for user"
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ server_user }}"
    content: "{{ server_user }} ALL=(ALL) NOPASSWD: ALL"
    mode: "0440"
    validate: "visudo -cf %s"

# Packages
- name: "Update apt cache"
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: "Install packages"
  ansible.builtin.apt:
    name: "{{ packages + (extra_packages | default([])) }}"
    state: present

- name: "Configure fzf"
  ansible.builtin.blockinfile:
    path: "/home/{{ server_user }}/.bashrc"
    marker: "# {mark} ANSIBLE MANAGED BLOCK: fzf"
    block: |
      # fzf setup
      if [ -f /usr/share/doc/fzf/examples/key-bindings.bash ]; then
        source /usr/share/doc/fzf/examples/key-bindings.bash
      fi
      if [ -f /usr/share/doc/fzf/examples/completion.bash ]; then
        source /usr/share/doc/fzf/examples/completion.bash
      fi

# Python
- name: "Check if uv is installed"
  ansible.builtin.stat:
    path: /usr/local/bin/uv
  register: common_uv_stat

- name: "Download uv installer"
  ansible.builtin.get_url:
    url: https://astral.sh/uv/install.sh
    dest: /tmp/uv-installer.sh
    mode: "0755"
  when: not common_uv_stat.stat.exists

- name: "Install uv"
  ansible.builtin.command:
    cmd: /tmp/uv-installer.sh
    creates: "/usr/local/bin/uv"
  environment:
    UV_INSTALL_DIR: "/usr/local/bin"
  become: true
  when: not common_uv_stat.stat.exists

# Directories
- name: "Create data directory"
  ansible.builtin.file:
    path: "{{ data_dir }}"
    state: directory
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0755"

- name: "Create apps data directory"
  ansible.builtin.file:
    path: "{{ apps_data_dir }}"
    state: directory
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0755"

- name: "Symlink stacks directory"
  ansible.builtin.file:
    src: "{{ stacks_dir }}"
    dest: "{{ stacks_symlink }}"
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    state: link
    force: true

# UFW
- name: "Allow SSH"
  community.general.ufw:
    rule: allow
    name: "OpenSSH"

- name: "Allow HTTP"
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: "Allow HTTPS"
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: "Enable UFW"
  community.general.ufw:
    state: enabled

# ==============================================================================
# Composable task files (controlled by variables in host group_vars)
# ==============================================================================

- name: "Include Home Assistant host prerequisites"
  ansible.builtin.include_tasks: ha_host_setup.yml
  when: ha_host_setup | default(false)

- name: "Include data disk tasks"
  ansible.builtin.include_tasks: data_disk.yml
  when: data_disk_uuid is defined

- name: "Include DNS stub disable tasks"
  ansible.builtin.include_tasks: disable_default_dns.yml
  when: disable_default_dns | default(false)

- name: "Include journald tasks"
  ansible.builtin.include_tasks: journald.yml
  when: configure_journald | default(true)
