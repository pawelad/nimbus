---
- name: "Update apt cache"
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: "Set hostname"
  ansible.builtin.hostname:
    name: "{{ server_name }}"

- name: "Ensure server user exists"
  ansible.builtin.user:
    name: "{{ server_user }}"
    shell: /bin/bash
    groups: sudo
    append: true
    state: present

- name: "Ensure passwordless sudo for user"
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ server_user }}"
    content: "{{ server_user }} ALL=(ALL) NOPASSWD: ALL"
    mode: "0440"
    validate: "visudo -cf %s"

- name: "Create .ssh directory for server user"
  ansible.builtin.file:
    path: "/home/{{ server_user }}/.ssh"
    state: directory
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0700"

- name: "Install basic packages"
  ansible.builtin.apt:
    name: "{{ packages }}"
    state: present

- name: "Configure fzf"
  ansible.builtin.blockinfile:
    path: "/home/{{ server_user }}/.bashrc"
    marker: "# {mark} ANSIBLE MANAGED BLOCK: fzf"
    block: |
      # fzf setup
      if [ -f /usr/share/doc/fzf/examples/key-bindings.bash ]; then
        source /usr/share/doc/fzf/examples/key-bindings.bash
      fi
      if [ -f /usr/share/doc/fzf/examples/completion.bash ]; then
        source /usr/share/doc/fzf/examples/completion.bash
      fi

- name: "Download uv installer"
  ansible.builtin.get_url:
    url: https://astral.sh/uv/install.sh
    dest: /tmp/uv-installer.sh
    mode: "0755"

- name: "Install uv"
  ansible.builtin.command:
    cmd: /tmp/uv-installer.sh
  environment:
    UV_INSTALL_DIR: "/usr/local/bin"
  changed_when: false
  become: true

- name: "Create data directory"
  ansible.builtin.file:
    path: "{{ data_dir }}"
    state: directory
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0755"

- name: "Create apps data directory"
  ansible.builtin.file:
    path: "{{ apps_data_dir }}"
    state: directory
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0755"

- name: "Symlink stacks directory"
  ansible.builtin.file:
    src: "{{ stacks_dir }}"
    dest: "{{ stacks_symlink }}"
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    state: link
    force: true

- name: "Check UFW status"
  ansible.builtin.command: "ufw status"
  register: common_ufw_status
  changed_when: false

- name: "Allow SSH"
  community.general.ufw:
    rule: allow
    name: "OpenSSH"

- name: "Allow HTTP"
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: "Allow HTTPS"
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: "Enable UFW"
  community.general.ufw:
    state: enabled
