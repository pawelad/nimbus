---
# Dokploy is a self-managing PaaS that runs on Docker Swarm.
# It's installed via the official install script which sets up:
# PostgreSQL, Redis, Traefik, and the Dokploy app as Docker Swarm services.
#
# Docs: https://docs.dokploy.com/docs/core/installation
# Update: curl -sSL https://dokploy.com/install.sh | sh -s update

- name: "Check if Dokploy is already installed"
  ansible.builtin.stat:
    path: /etc/dokploy
  register: dokploy_dir

- name: "Download Dokploy install script"
  ansible.builtin.get_url:
    url: https://dokploy.com/install.sh
    dest: /tmp/dokploy_install.sh
    mode: "0755"
  when: not dokploy_dir.stat.exists

- name: "Install Dokploy via official install script"
  ansible.builtin.command:
    cmd: /tmp/dokploy_install.sh
  when: not dokploy_dir.stat.exists
  register: dokploy_install
  changed_when: true

- name: "Ensure Dokploy service is running"
  community.docker.docker_swarm_service: # noqa args[module]
    name: dokploy
    replicas: 1
