---
# Dokploy is a self-managing PaaS that runs on Docker Swarm.
# Unlike other stacks, it's installed via the official install script
# which sets up: PostgreSQL, Redis, Traefik, and the Dokploy app
# as Docker Swarm services.
#
# Docs: https://docs.dokploy.com/docs/core/installation
# Update: curl -sSL https://dokploy.com/install.sh | sh -s update

- name: "Check if Dokploy is already installed"
  ansible.builtin.command:
    cmd: docker service ls --filter name=dokploy --format '{{ '{{' }}.Name{{ '}}' }}'
  register: dokploy_service_check
  changed_when: false
  failed_when: false

- name: "Install Dokploy via official install script"
  ansible.builtin.shell:
    cmd: curl -sSL https://dokploy.com/install.sh | sh
  when: >
    dokploy_service_check.rc != 0 or
    'dokploy' not in dokploy_service_check.stdout
