---
- name: "Ensure Vector data directory exists"
  ansible.builtin.file:
    path: "{{ apps_data_dir }}/vector/config"
    state: directory
    mode: "0755"

- name: "Ensure Vector configuration"
  ansible.builtin.import_role:
    name: common
    tasks_from: ensure_config
  vars:
    service_name: vector
    config_src: "{{ inventory_hostname }}/vector.config.yaml.j2"
    config_dest: "{{ apps_data_dir }}/vector/config/vector.yaml"

- name: "Ensure Vector stack is up to date"
  ansible.builtin.import_role:
    name: common
    tasks_from: ensure_stack
  vars:
    stack_name: vector
