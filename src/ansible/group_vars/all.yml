---
ansible_user: pawel
server_user: pawel

# Common packages installed on all servers
packages:
  - acl
  - curl
  - fzf
  - git
  - htop
  - python3
  - tree
  - ufw
  - vim

# Base data directory
data_dir: "/data"

# Git deployment paths
repo_dir: "{{ data_dir }}/{{ inventory_hostname }}"

# We use the inventory hostname (kif or zapp) to organize stacks
stacks_dir: "{{ repo_dir }}/src/stacks/{{ inventory_hostname }}"

# Persistent app data (outside git)
apps_data_dir: "{{ data_dir }}/apps"

# Stacks symlink (points to the host-specific stacks folder)
stacks_symlink: "{{ data_dir }}/stacks"

